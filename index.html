<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Memorias del Cielo</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Pinyon+Script&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{
    width:100%; height:100%; overflow:hidden; background:#000; cursor:none;
    touch-action:none;          /* bloquea zoom y scroll del navegador */
    -webkit-user-select:none;
    user-select:none;
    -webkit-tap-highlight-color:transparent;
    overscroll-behavior:none;
  }
  canvas{ display:block; touch-action:none; }

  /* ── Cursor ── */
  #cursor{
    position:fixed; width:7px; height:7px; border-radius:50%;
    background:rgba(255,255,255,.9); pointer-events:none; z-index:200;
    transform:translate(-50%,-50%);
    box-shadow:0 0 8px 2px rgba(200,215,255,.45);
    transition:transform .14s ease,background .22s,box-shadow .22s;
  }
  #cursor.hover{
    transform:translate(-50%,-50%) scale(3.8);
    background:rgba(240,208,128,.95);
    box-shadow:0 0 18px 5px rgba(240,208,128,.55);
  }

  /* ── Hint ── */
  #hint{
    position:fixed; bottom:26px; left:50%;
    transform:translateX(-50%);
    font-family:'Cormorant Garamond',serif;
    font-size:10px; letter-spacing:.36em; text-transform:uppercase;
    color:rgba(140,165,210,0); pointer-events:none; z-index:10;
    animation:fadeHint 5s ease forwards; animation-delay:2s;
  }
  @keyframes fadeHint{
    0%  {color:rgba(140,165,210,0); transform:translateX(-50%) translateY(6px)}
    18% {color:rgba(140,165,210,.42); transform:translateX(-50%) translateY(0)}
    75% {color:rgba(140,165,210,.42)}
    100%{color:rgba(140,165,210,0)}
  }

  /* ── Backdrop ── */
  #msg-backdrop{
    position:fixed; inset:0; z-index:50;
    background:rgba(0,2,12,.52);
    backdrop-filter:blur(4px);
    -webkit-backdrop-filter:blur(4px);
    opacity:0; pointer-events:none;
    transition:opacity .75s ease;
  }
  #msg-backdrop.visible{ opacity:1; pointer-events:auto; }

  /* ── Panel ── */
  #msg-panel{
    position:fixed; left:50%; top:50%;
    transform:translate(-50%,-48%) translateY(22px);
    width:min(640px,88vw);
    opacity:0; pointer-events:none; z-index:60;
    transition:opacity .7s cubic-bezier(.22,1,.36,1),
               transform .7s cubic-bezier(.22,1,.36,1);
  }
  #msg-panel.visible{
    opacity:1; pointer-events:auto;
    transform:translate(-50%,-50%) translateY(0);
  }
  #msg-panel::before{
    content:'';
    position:absolute; top:0; left:8%; right:8%; height:1px;
    background:var(--sc,rgba(240,208,128,.65));
    box-shadow:0 0 20px 4px var(--sc,rgba(240,208,128,.22));
    border-radius:1px;
  }
  #msg-inner{
    background:linear-gradient(160deg,rgba(3,6,20,.97) 0%,rgba(5,9,26,.98) 100%);
    border:1px solid rgba(255,255,255,.055); border-top:none;
    padding:46px 54px 42px; position:relative;
  }
  #msg-inner::after{
    content:''; position:absolute; top:0; right:0;
    width:130px; height:130px; pointer-events:none;
    background:radial-gradient(circle at top right,
      var(--sc,rgba(240,208,128,.06)) 0%,transparent 65%);
  }
  #msg-header{ display:flex; align-items:center; gap:13px; margin-bottom:28px; }
  #msg-dot{
    width:5px; height:5px; border-radius:50%; flex-shrink:0;
    background:var(--sc,rgba(240,208,128,.85));
    box-shadow:0 0 9px 3px var(--sc,rgba(240,208,128,.3));
    animation:dotPulse 2.6s ease-in-out infinite;
  }
  @keyframes dotPulse{
    0%,100%{box-shadow:0 0 9px 3px var(--sc,rgba(240,208,128,.3))}
    50%    {box-shadow:0 0 16px 5px var(--sc,rgba(240,208,128,.55))}
  }
  #msg-date{
    font-family:'Cormorant Garamond',serif; font-size:10px; font-weight:300;
    letter-spacing:.42em; text-transform:uppercase; color:rgba(110,135,175,.52);
  }
  #msg-divider{ width:28px; height:1px; background:rgba(255,255,255,.06); margin-bottom:28px; }
  #msg-text{
    font-family:'Pinyon Script',cursive;
    font-size:clamp(27px,3.9vw,44px); line-height:1.65;
    color:rgba(255,252,248,.93); white-space:pre-wrap; min-height:2.6em;
    text-shadow:0 0 45px var(--sc,rgba(240,208,128,.1)), 0 2px 10px rgba(0,0,0,.45);
  }
  #msg-blink{
    display:inline-block; width:1.5px; height:.85em;
    background:var(--sc,rgba(240,208,128,.6));
    margin-left:4px; vertical-align:text-bottom;
    animation:blink 1s step-end infinite;
  }
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
  #msg-footer{ margin-top:34px; display:flex; align-items:center; }
  #msg-footer-line{
    flex:1; height:1px;
    background:linear-gradient(to right,rgba(255,255,255,.055) 0%,transparent 100%);
  }
  #msg-close{
    font-family:'Cormorant Garamond',serif; font-size:9.5px;
    letter-spacing:.32em; text-transform:uppercase;
    color:rgba(95,118,158,.38); cursor:pointer; padding-left:20px;
    transition:color .22s, letter-spacing .22s; user-select:none;
  }
  #msg-close:hover{ color:rgba(180,200,255,.55); letter-spacing:.40em; }

  /* ── Botón audio ── */
  #audio-btn{
    position:fixed; bottom:26px; right:28px; z-index:70;
    display:flex; align-items:center; gap:9px;
    padding:9px 16px 9px 13px;
    background:rgba(3,6,20,.78); border:1px solid rgba(255,255,255,.07);
    cursor:pointer; user-select:none;
    opacity:0; pointer-events:none;
    transition:opacity .6s ease, border-color .25s, background .25s;
  }
  #audio-btn.show{ opacity:1; pointer-events:auto; }
  #audio-btn:hover{ background:rgba(5,10,30,.92); border-color:rgba(255,255,255,.13); }
  #audio-waves{ display:flex; align-items:center; gap:2.5px; height:14px; }
  #audio-waves span{
    display:block; width:2px; background:rgba(180,200,255,.5); border-radius:1px;
    transform-origin:bottom; animation:wave 1.2s ease-in-out infinite;
  }
  #audio-waves span:nth-child(1){height:5px;  animation-delay:0s}
  #audio-waves span:nth-child(2){height:10px; animation-delay:.15s}
  #audio-waves span:nth-child(3){height:14px; animation-delay:.3s}
  #audio-waves span:nth-child(4){height:10px; animation-delay:.45s}
  #audio-waves span:nth-child(5){height:5px;  animation-delay:.6s}
  @keyframes wave{0%,100%{transform:scaleY(.4);opacity:.4}50%{transform:scaleY(1);opacity:1}}
  #audio-btn.paused #audio-waves span{animation-play-state:paused;transform:scaleY(.35);opacity:.3}
  #audio-label{
    font-family:'Cormorant Garamond',serif; font-size:9px;
    letter-spacing:.32em; text-transform:uppercase;
    color:rgba(140,160,200,.48); transition:color .2s;
  }
  #audio-btn:hover #audio-label{ color:rgba(180,200,255,.7); }

  /* ── Vignette ── */
  #vignette{
    position:fixed; inset:0; z-index:5; pointer-events:none;
    background:radial-gradient(ellipse 110% 110% at 50% 50%,
      transparent 32%,rgba(0,1,6,.72) 100%);
  }
</style>
</head>
<body>

<div id="vignette"></div>
<div id="cursor"></div>
<div id="hint">las estrellas que brillan guardan un secreto</div>

<div id="audio-btn" class="paused">
  <div id="audio-waves">
    <span></span><span></span><span></span><span></span><span></span>
  </div>
  <div id="audio-label">silencio</div>
</div>

<div id="msg-backdrop"></div>
<div id="msg-panel">
  <div id="msg-inner">
    <div id="msg-header">
      <div id="msg-dot"></div>
      <div id="msg-date"></div>
    </div>
    <div id="msg-divider"></div>
    <div id="msg-text"><span id="msg-typed"></span><span id="msg-blink"></span></div>
    <div id="msg-footer">
      <div id="msg-footer-line"></div>
      <div id="msg-close">cerrar</div>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════
   CONFIG MENSAJES
═══════════════════════════════════════════════════ */
const HOY = new Date()
// readSet guarda índices de mensajes ya leídos (persiste en sessionStorage)
const readSet = new Set(JSON.parse(sessionStorage.getItem('readStars')||'[]'))
function markRead(idx){ readSet.add(idx); sessionStorage.setItem('readStars',JSON.stringify([...readSet])) }

const MENSAJES = [
  { fecha:new Date('2026-03-10'), texto:'El tiempo guardó este mensaje para ti.',               color:{h:.10,s:.90,l:.72} }, // dorado-naranja
  { fecha:new Date('2026-02-15'), texto:'Feliz cumpleaños mi amor.\nSiempre estaré contigo.',   color:{h:.56,s:.85,l:.72} }, // azul-cian
  { fecha:new Date('2030-01-01'), texto:'Si estás leyendo esto, han pasado muchos años desde que lo escribí.', color:{h:.82,s:.80,l:.72} }, // violeta-rosa
]

function hsl(h,s,l){
  let r,g,b; const c=(1-Math.abs(2*l-1))*s,x=c*(1-Math.abs((h*6)%2-1)),m=l-c/2
  if(h<1/6){r=c;g=x;b=0}else if(h<2/6){r=x;g=c;b=0}else if(h<3/6){r=0;g=c;b=x}
  else if(h<4/6){r=0;g=x;b=c}else if(h<5/6){r=x;g=0;b=c}else{r=c;g=0;b=x}
  return [r+m,g+m,b+m]
}

/* ═══════════════════════════════════════════════════
   RENDERER
═══════════════════════════════════════════════════ */
const W=innerWidth, H=innerHeight, PR=Math.min(devicePixelRatio,2)
const isMobile = W < 600 || ('ontouchstart' in window && W < 900)

const renderer=new THREE.WebGLRenderer({antialias:false})
renderer.setPixelRatio(PR); renderer.setSize(W,H)
renderer.toneMapping=THREE.ACESFilmicToneMapping
renderer.toneMappingExposure=1.1
document.body.appendChild(renderer.domElement)

/* Canvas 2D para DOF compositing */
const cvs2d=document.createElement('canvas')
cvs2d.width=W*PR; cvs2d.height=H*PR
cvs2d.style.cssText=`position:fixed;inset:0;width:${W}px;height:${H}px;pointer-events:none;z-index:4`
document.body.appendChild(cvs2d)
const ctx2d=cvs2d.getContext('2d')

const scene=new THREE.Scene()
const camera=new THREE.PerspectiveCamera(isMobile ? 72 : 55, W/H, .5, 4000)
camera.position.set(0,0,isMobile ? 340 : 220)

/* ═══════════════════════════════════════════════════
   CAMPO DE ESTRELLAS — Three.js shader (fondo fijo)
═══════════════════════════════════════════════════ */
;(function buildBgStars(){
  const N=18000
  const pos=new Float32Array(N*3),col=new Float32Array(N*3)
  const sz=new Float32Array(N),ph=new Float32Array(N),sp=new Float32Array(N)
  const palette=[[1,.96,.90],[.88,.93,1],[1,.89,.72],[.98,.98,1],[.80,.90,1]]
  for(let i=0;i<N;i++){
    const i3=i*3
    const theta=Math.random()*Math.PI*2
    const phi=Math.acos(2*Math.random()-1)
    const r=400+Math.pow(Math.random(),.35)*2200
    pos[i3]=r*Math.sin(phi)*Math.cos(theta)
    pos[i3+1]=r*Math.sin(phi)*Math.sin(theta)*.65
    pos[i3+2]=r*Math.cos(phi)
    const c=palette[~~(Math.random()*palette.length)]
    const b=.45+Math.random()*.55
    col[i3]=c[0]*b; col[i3+1]=c[1]*b; col[i3+2]=c[2]*b
    sz[i]=Math.pow(Math.random(),2.8)*3.2+.2
    ph[i]=Math.random()*Math.PI*2
    sp[i]=.2+Math.random()*.8
  }
  const geo=new THREE.BufferGeometry()
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3))
  geo.setAttribute('color',   new THREE.BufferAttribute(col,3))
  geo.setAttribute('aS',      new THREE.BufferAttribute(sz,1))
  geo.setAttribute('aPh',     new THREE.BufferAttribute(ph,1))
  geo.setAttribute('aSp',     new THREE.BufferAttribute(sp,1))
  const mat=new THREE.ShaderMaterial({
    uniforms:{uT:{value:0},uPR:{value:PR}},
    vertexShader:`
      attribute float aS,aPh,aSp; varying vec3 vC; varying float vA;
      uniform float uT,uPR;
      void main(){
        vC=color;
        float tw=.72+.15*sin(uT*aSp+aPh)+.08*sin(uT*aSp*2.3+aPh*1.8)+.05*sin(uT*aSp*5.1+aPh*.5);
        vA=tw;
        vec4 mv=modelViewMatrix*vec4(position,1.); float att=clamp(1.+mv.z/2000.,.0,1.);
        gl_PointSize=aS*tw*uPR*att*(100./-mv.z); gl_Position=projectionMatrix*mv;
      }`,
    fragmentShader:`
      varying vec3 vC; varying float vA;
      void main(){
        vec2 uv=gl_PointCoord-.5; float d=length(uv); if(d>.5)discard;
        float a=(exp(-d*10.)+exp(-d*3.5)*.28)*vA;
        gl_FragColor=vec4(vC+vC*exp(-d*10.)*.4,a);
      }`,
    vertexColors:true,transparent:true,depthWrite:false,blending:THREE.AdditiveBlending
  })
  const pts=new THREE.Points(geo,mat)
  scene.add(pts)
  scene.userData.bgStarMat=mat
})()

/* ═══════════════════════════════════════════════════
   PLANETA
═══════════════════════════════════════════════════ */
const planetMat=new THREE.ShaderMaterial({
  uniforms:{uTime:{value:0},uLight:{value:new THREE.Vector3(1.2,.6,1.).normalize()}},
  vertexShader:`varying vec3 vN,vP; varying vec2 vUv;
    void main(){ vN=normalize(normalMatrix*normal); vP=position; vUv=uv;
    gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.); }`,
  fragmentShader:`
    uniform float uTime; uniform vec3 uLight;
    varying vec3 vN,vP; varying vec2 vUv;
    float hash(vec3 p){p=fract(p*vec3(443.9,397.3,491.2));p+=dot(p.zxy,p.yxz+19.3);return fract(p.x*p.y*p.z);}
    float noise(vec3 p){vec3 i=floor(p),f=fract(p);f=f*f*(3.-2.*f);
      return mix(mix(mix(hash(i),hash(i+vec3(1,0,0)),f.x),mix(hash(i+vec3(0,1,0)),hash(i+vec3(1,1,0)),f.x),f.y),
                 mix(mix(hash(i+vec3(0,0,1)),hash(i+vec3(1,0,1)),f.x),mix(hash(i+vec3(0,1,1)),hash(i+vec3(1,1,1)),f.x),f.y),f.z);}
    float fbm(vec3 p){float v=0.,a=.5;mat3 rot=mat3(.8,.6,0,-.6,.8,0,0,0,1);
      for(int i=0;i<6;i++){v+=a*noise(p);p=rot*p*2.1+.7;a*=.48;}return v;}
    void main(){
      vec3 pp=vP*.022+vec3(uTime*.006,uTime*.004,0.);
      float n1=fbm(pp),n2=fbm(pp*1.8+5.3),n3=fbm(pp*3.5+n1*2.);
      float land=smoothstep(.42,.55,n1+n2*.25),mtn=smoothstep(.6,.8,n1+n3*.3);
      float clouds=smoothstep(.6,.75,fbm(pp*2.2+uTime*.012+8.));
      vec3 ocean=mix(vec3(.04,.10,.28),vec3(.08,.22,.55),n2);
      vec3 shore=mix(vec3(.55,.48,.30),vec3(.35,.55,.20),n2);
      vec3 mtncol=mix(vec3(.40,.38,.35),vec3(.78,.78,.80),mtn);
      vec3 col=mix(ocean,shore,land); col=mix(col,mtncol,mtn*.6);
      col=mix(col,vec3(.95,.97,1.),clouds*.85);
      float diff=dot(vN,uLight)*.5+.5;
      float wSpec=pow(max(dot(reflect(-uLight,vN),vec3(0,0,1)),.0),60.)*(1.-land);
      float term=smoothstep(-.15,.15,dot(vN,uLight));
      col=col*(.12+diff*.88); col+=vec3(.6,.75,1.)*wSpec*.45;
      col*=mix(.08,1.,term);
      float fr=pow(1.-abs(dot(vN,vec3(0,0,1))),4.);
      col=mix(col,vec3(.28,.55,1.)*1.4,fr*.5*term);
      gl_FragColor=vec4(col,1.);
    }`,
})
const planet=new THREE.Mesh(new THREE.SphereGeometry(50,128,128),planetMat)
scene.add(planet)

/* Atmósfera */
scene.add(new THREE.Mesh(new THREE.SphereGeometry(54,64,64),new THREE.ShaderMaterial({
  uniforms:{uLight:{value:new THREE.Vector3(1.2,.6,1.).normalize()}},
  vertexShader:`varying vec3 vN; void main(){ vN=normalize(normalMatrix*normal); gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.); }`,
  fragmentShader:`uniform vec3 uLight; varying vec3 vN;
    void main(){ float fr=pow(1.-abs(dot(vN,vec3(0,0,1))),2.5),lit=max(dot(vN,uLight),.0)*.5+.5;
    vec3 col=mix(vec3(.1,.3,.9),vec3(.3,.65,1.),fr); gl_FragColor=vec4(col*lit*fr,fr*.7); }`,
  transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,side:THREE.BackSide
})))

/* Nubes */
const cloudMat=new THREE.ShaderMaterial({
  uniforms:{uTime:{value:0},uLight:{value:new THREE.Vector3(1.2,.6,1.).normalize()}},
  vertexShader:`varying vec3 vN,vP; void main(){vN=normalize(normalMatrix*normal);vP=position;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
  fragmentShader:`
    uniform float uTime; uniform vec3 uLight; varying vec3 vN,vP;
    float hash(vec3 p){p=fract(p*vec3(443.9,397.3,491.2));p+=dot(p.zxy,p.yxz+19.3);return fract(p.x*p.y*p.z);}
    float noise(vec3 p){vec3 i=floor(p),f=fract(p);f=f*f*(3.-2.*f);
      return mix(mix(mix(hash(i),hash(i+vec3(1,0,0)),f.x),mix(hash(i+vec3(0,1,0)),hash(i+vec3(1,1,0)),f.x),f.y),
                 mix(mix(hash(i+vec3(0,0,1)),hash(i+vec3(1,0,1)),f.x),mix(hash(i+vec3(0,1,1)),hash(i+vec3(1,1,1)),f.x),f.y),f.z);}
    float fbm(vec3 p){float v=0.,a=.5;for(int i=0;i<4;i++){v+=a*noise(p);p*=2.1;a*=.5;}return v;}
    void main(){
      vec3 pp=vP*.028+vec3(uTime*.009,0.,uTime*.005);
      float c=smoothstep(.55,.72,fbm(pp));
      float lit=dot(vN,uLight)*.4+.6;
      gl_FragColor=vec4(vec3(.97,.98,1.)*lit,c*.5);}`,
  transparent:true,depthWrite:false,side:THREE.FrontSide
})
scene.add(new THREE.Mesh(new THREE.SphereGeometry(51.5,128,128),cloudMat))

/* Luna */
const moonMat=new THREE.ShaderMaterial({
  uniforms:{uTime:{value:0},uLight:{value:new THREE.Vector3(1.2,.6,1.).normalize()}},
  vertexShader:`varying vec3 vN,vP;void main(){vN=normalize(normalMatrix*normal);vP=position;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
  fragmentShader:`
    uniform float uTime;uniform vec3 uLight;varying vec3 vN,vP;
    float hash(vec3 p){p=fract(p*vec3(443.9,397.3,491.2));p+=dot(p.zxy,p.yxz+19.3);return fract(p.x*p.y*p.z);}
    float noise(vec3 p){vec3 i=floor(p),f=fract(p);f=f*f*(3.-2.*f);
      return mix(mix(mix(hash(i),hash(i+vec3(1,0,0)),f.x),mix(hash(i+vec3(0,1,0)),hash(i+vec3(1,1,0)),f.x),f.y),
                 mix(mix(hash(i+vec3(0,0,1)),hash(i+vec3(1,0,1)),f.x),mix(hash(i+vec3(0,1,1)),hash(i+vec3(1,1,1)),f.x),f.y),f.z);}
    float fbm(vec3 p){float v=0.,a=.5;for(int i=0;i<4;i++){v+=a*noise(p);p*=2.1;a*=.5;}return v;}
    void main(){
      float n=fbm(vP*.08); vec3 col=mix(vec3(.32,.30,.28),vec3(.62,.60,.58),n);
      float lit=dot(vN,uLight)*.5+.5,term=smoothstep(-.1,.1,dot(vN,uLight));
      col*=mix(.05,1.,term)*(.2+lit*.8);
      float fr=pow(1.-abs(dot(vN,vec3(0,0,1))),3.);
      gl_FragColor=vec4(col+fr*.04,1.);}`,
})
const moon=new THREE.Mesh(new THREE.SphereGeometry(9,64,64),moonMat)
scene.add(moon)

/* ═══════════════════════════════════════════════════
   ESTRELLAS ESPECIALES (MENSAJES) — Three.js meshes
═══════════════════════════════════════════════════ */
const memorySpheres=[]
const raycaster=new THREE.Raycaster()
const mouse2D=new THREE.Vector2(-9999,-9999)

MENSAJES.forEach((msg,idx)=>{
  const unlocked=HOY>=msg.fecha
  const [r,g,b]=hsl(msg.color.h,msg.color.s,msg.color.l)

  /* Posición — más cercanas en móvil para que entren en pantalla */
  const angle=(idx/MENSAJES.length)*Math.PI*2+.8
  const baseRadius = isMobile ? 68 : 90
  const radius = baseRadius + idx * (isMobile ? 14 : 18)
  const x=Math.cos(angle)*radius+Math.sin(idx*2.3)*10
  const y=12-idx*(isMobile?10:14)+Math.cos(idx*3.1)*8
  const z=Math.sin(angle)*radius*.6

  /* Núcleo brillante */
  const isRead = readSet.has(idx)
  const coreMat=new THREE.ShaderMaterial({
    uniforms:{uT:{value:0},uColor:{value:new THREE.Vector3(r,g,b)},uUnlocked:{value:unlocked?1.:0.},uHover:{value:0.},uBurst:{value:0.},uRead:{value:isRead?1.:0.}},
    vertexShader:`varying vec3 vN,vP; void main(){vN=normalize(normalMatrix*normal);vP=position;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
    fragmentShader:`
      uniform float uT,uUnlocked,uHover,uBurst,uRead; uniform vec3 uColor; varying vec3 vN,vP;
      void main(){
        float fr=pow(1.-abs(dot(vN,vec3(0,0,1))),2.8);
        /* Bloqueada — gris fría, pequeña */
        if(uUnlocked<.5){float d=.22+.06*sin(uT*.38);gl_FragColor=vec4(vec3(.28,.33,.44)*d+fr*.04,.48);return;}
        /* Ya leída — mismo color pero más tenue, sin pulso agresivo */
        if(uRead>.5){
          float p=.42+.10*sin(uT*.35+.5);
          vec3 c=uColor*.65*p;
          c+=uColor*fr*.6*p;
          gl_FragColor=vec4(c, mix(.38,.55,p)); return;}
        /* No leída — plena, pulsando, llamando la atención */
        float pulse=.85+.15*sin(uT*1.1+.8)*sin(uT*.7+.4)+.06*sin(uT*2.2);
        float glow=mix(1.,1.8,uHover); float burst=1.+uBurst*2.8;
        vec3 c=uColor*pulse*glow*burst;
        float core=clamp(1.-length(vP)*2.,0.,1.); c+=uColor*core*.8*pulse; c+=uColor*fr*1.5;
        gl_FragColor=vec4(c,mix(.72,1.,pulse)*glow);}`,
    transparent:true,depthWrite:false,blending:THREE.AdditiveBlending
  })
  // Tamaño: más grande para que sea fácil tocar en móvil
  const coreRadius = unlocked ? 1.6 : 0.7
  const coreMesh=new THREE.Mesh(new THREE.SphereGeometry(coreRadius,32,32),coreMat)
  coreMesh.position.set(x,y,z); scene.add(coreMesh)

  /* Halo */
  let haloMesh=null
  if(unlocked){
    const hMat=new THREE.ShaderMaterial({
      uniforms:{uT:{value:0},uColor:{value:new THREE.Vector3(r,g,b)},uHover:{value:0.}},
      vertexShader:`varying vec3 vN;void main(){vN=normalize(normalMatrix*normal);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
      fragmentShader:`uniform float uT,uHover;uniform vec3 uColor;varying vec3 vN;
        void main(){float fr=pow(1.-abs(dot(vN,vec3(0,0,1))),1.7),p=.38+.18*sin(uT*.85+.6),g=mix(1.,1.9,uHover);
        gl_FragColor=vec4(uColor*fr*p*g,fr*.5*p*g);}`,
      transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,side:THREE.BackSide
    })
    haloMesh=new THREE.Mesh(new THREE.SphereGeometry(5.0,32,32),hMat)
    haloMesh.position.set(x,y,z); scene.add(haloMesh)
  }

  /* Anillo "ya leída" — círculo exterior visible, estático */
  let ringMesh=null
  if(unlocked && isRead){
    const ringGeo = new THREE.TorusGeometry(3.8, 0.18, 8, 48)
    const ringMat2 = new THREE.ShaderMaterial({
      uniforms:{ uT:{value:0}, uColor:{value:new THREE.Vector3(r,g,b)} },
      vertexShader:`varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.); }`,
      fragmentShader:`uniform float uT; uniform vec3 uColor; varying vec2 vUv;
        void main(){
          float p = .55 + .15*sin(uT*.28 + vUv.x*6.28);
          gl_FragColor = vec4(uColor*p, p*.75);
        }`,
      transparent:true, depthWrite:false, blending:THREE.AdditiveBlending
    })
    ringMesh = new THREE.Mesh(ringGeo, ringMat2)
    ringMesh.position.set(x,y,z)
    /* Inclinar el anillo un poco para que se vea bien en 3D */
    ringMesh.rotation.x = 0.6
    ringMesh.rotation.z = 0.3
    scene.add(ringMesh)
  }
  let orbitPts=null
  if(unlocked){
    const N=60, op=new Float32Array(N*3),oph=new Float32Array(N),orad=new Float32Array(N)
    for(let i=0;i<N;i++){oph[i]=(i/N)*Math.PI*2;orad[i]=3+Math.random()*5;op[i*3]=x+Math.cos(oph[i])*orad[i];op[i*3+1]=y+(Math.random()-.5)*2;op[i*3+2]=z+Math.sin(oph[i])*orad[i]*.4;}
    const og=new THREE.BufferGeometry()
    og.setAttribute('position',new THREE.BufferAttribute(op,3))
    og.setAttribute('aPhase',new THREE.BufferAttribute(oph,1))
    og.setAttribute('aRad',new THREE.BufferAttribute(orad,1))
    const om=new THREE.ShaderMaterial({
      uniforms:{uT:{value:0},uColor:{value:new THREE.Vector3(r,g,b)},uCenter:{value:new THREE.Vector3(x,y,z)},uHover:{value:0.}},
      vertexShader:`attribute float aPhase,aRad;uniform float uT,uHover;uniform vec3 uCenter;varying float vA;
        void main(){float sp=.16+aRad*.018,ang=aPhase+uT*sp,tilt=sin(aPhase*2.2)*.4;
        vec3 p;p.x=uCenter.x+cos(ang)*aRad;p.y=uCenter.y+sin(ang*.65+tilt)*aRad*.22;p.z=uCenter.z+sin(ang)*aRad*.5;
        vA=(0.35+.38*sin(uT*1.4+aPhase))*mix(1.,1.6,uHover);
        vec4 mv=modelViewMatrix*vec4(p,1.);gl_PointSize=(1.1+.55*sin(aPhase+uT))*(55./-mv.z)*mix(1.,1.5,uHover);gl_Position=projectionMatrix*mv;}`,
      fragmentShader:`uniform vec3 uColor;varying float vA;
        void main(){vec2 uv=gl_PointCoord-.5;float d=length(uv);if(d>.5)discard;gl_FragColor=vec4(uColor*1.5,exp(-d*8.)*vA);}`,
      transparent:true,depthWrite:false,blending:THREE.AdditiveBlending
    })
    orbitPts=new THREE.Points(og,om); scene.add(orbitPts)
  }

  /* Hit proxy invisible — grande para móvil */
  const hit=new THREE.Mesh(new THREE.SphereGeometry(7,8,8),new THREE.MeshBasicMaterial({visible:false}))
  hit.position.set(x,y,z); scene.add(hit)

  memorySpheres.push({msg,unlocked,r,g,b,core:coreMesh,halo:haloMesh,orbit:orbitPts,ring:ringMesh,hit,
    pos:new THREE.Vector3(x,y,z),hoverT:0,burstT:0,idx})
})

   LÍNEAS DOF (datos CPU, dibujadas en canvas 2D)
═══════════════════════════════════════════════════ */
const LINE_COUNT=1800, lineData=[]
;(function(){
  for(let i=0;i<LINE_COUNT;i++){
    const theta=Math.random()*Math.PI*2,phi=Math.acos(2*Math.random()-1)
    const r=65+Math.pow(Math.random(),.5)*260
    const x=r*Math.sin(phi)*Math.cos(theta),y=r*Math.sin(phi)*Math.sin(theta)*.8,z=r*Math.cos(phi)
    const nx=Math.sin(phi)*Math.cos(theta),ny=Math.sin(phi)*Math.sin(theta),nz=Math.cos(phi)
    const tx=-Math.sin(theta),ty=Math.cos(theta),tz=0
    const bx=ny*tz-nz*ty,by=nz*tx-nx*tz,bz=nx*ty-ny*tx
    const ang=Math.random()*Math.PI*2,len=3+Math.random()*18
    const dx=Math.cos(ang)*tx+Math.sin(ang)*bx
    const dy=Math.cos(ang)*ty+Math.sin(ang)*by
    const dz=Math.cos(ang)*tz+Math.sin(ang)*bz
    const hue=Math.random(); let cr,cg,cb
    if(hue<.4){cr=.6+Math.random()*.4;cg=.75+Math.random()*.2;cb=1.}
    else if(hue<.7){cr=1.;cg=.9+Math.random()*.1;cb=.7+Math.random()*.3}
    else{cr=1.;cg=1.;cb=1.}
    lineData.push({x,y,z,dx,dy,dz,len,r:cr,g:cg,b:cb,
      alpha:.15+Math.random()*.55,phase:Math.random()*Math.PI*2,
      floatSpeed:.04+Math.random()*.08,floatAmp:1.5+Math.random()*4,dist:r})
  }
})()

/* DOF */
const DOF={focalDist:220,focalRange:80,maxBlur:22,strength:1.4}
function getBlur(worldDist,camDist){
  return Math.min(Math.abs(worldDist-DOF.focalDist)/DOF.focalRange*DOF.strength*10,DOF.maxBlur)
}

const _v3=new THREE.Vector3()
function project(wx,wy,wz){
  _v3.set(wx,wy,wz); _v3.project(camera)
  return{sx:(_v3.x*.5+.5)*W*PR,sy:(-.5*_v3.y+.5)*H*PR,behind:_v3.z>1.}
}

const panelEl    =document.getElementById('msg-panel')

const dateEl     =document.getElementById('msg-date')
const typedEl    =document.getElementById('msg-typed')
const closeEl    =document.getElementById('msg-close')
const cursorEl   =document.getElementById('cursor')
let typeTimer=null

function openMsg(s){
  s.burstT=1.
  // Marcar como leída y crear anillo si no existe
  markRead(s.idx)
  s.core.material.uniforms.uRead.value = 1.
  if(!s.ring){
    const ringGeo = new THREE.TorusGeometry(3.8, 0.18, 8, 48)
    const ringMat2 = new THREE.ShaderMaterial({
      uniforms:{ uT:{value:0}, uColor:{value:new THREE.Vector3(s.r,s.g,s.b)} },
      vertexShader:`varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.); }`,
      fragmentShader:`uniform float uT; uniform vec3 uColor; varying vec2 vUv;
        void main(){
          float p = .55 + .15*sin(uT*.28 + vUv.x*6.28);
          gl_FragColor = vec4(uColor*p, p*.75);
        }`,
      transparent:true, depthWrite:false, blending:THREE.AdditiveBlending
    })
    s.ring = new THREE.Mesh(ringGeo, ringMat2)
    s.ring.position.copy(s.pos)
    s.ring.rotation.x = 0.6
    s.ring.rotation.z = 0.3
    scene.add(s.ring)
  }
  clearTimeout(typeTimer)
  const [r,g,b]=hsl(s.msg.color.h,s.msg.color.s,s.msg.color.l)
  const css=`rgba(${~~(r*255)},${~~(g*255)},${~~(b*255)},.7)`
  panelEl.style.setProperty('--sc',css)
  document.getElementById('msg-dot').style.setProperty('--sc',css)
  const opts={year:'numeric',month:'long',day:'numeric'}

  typedEl.textContent=''
  panelEl.classList.add('visible')
  backdropEl.classList.add('visible')
  let i=0;const txt=s.msg.texto
  ;(function type(){if(i<txt.length){typedEl.textContent+=txt[i++];typeTimer=setTimeout(type,36+Math.random()*22)}})()
}
function closePanel(){panelEl.classList.remove('visible');backdropEl.classList.remove('visible');clearTimeout(typeTimer)}
closeEl.addEventListener('click',closePanel)
backdropEl.addEventListener('click',closePanel)
document.addEventListener('keydown',e=>{if(e.key==='Escape')closePanel()})

/* ═══════════════════════════════════════════════════
   CONTROL ORBITAL
═══════════════════════════════════════════════════ */
let rotX=.22,rotY=0,dragActive=false,lastMX=0,lastMY=0
let camDist = isMobile ? 340 : 220
let hovered=null

renderer.domElement.addEventListener('mousedown',e=>{dragActive=true;lastMX=e.clientX;lastMY=e.clientY})
window.addEventListener('mouseup',()=>{dragActive=false})
window.addEventListener('mousemove',e=>{
  mouse2D.x=(e.clientX/W)*2-1; mouse2D.y=-(e.clientY/H)*2+1
  cursorEl.style.left=e.clientX+'px'; cursorEl.style.top=e.clientY+'px'
  if(!dragActive)return
  rotY+=(e.clientX-lastMX)*.005; rotX+=(e.clientY-lastMY)*.005
  rotX=Math.max(-.9,Math.min(.9,rotX)); lastMX=e.clientX;lastMY=e.clientY
})
window.addEventListener('wheel',e=>{
  camDist=Math.max(isMobile?180:90, Math.min(isMobile?550:600, camDist+e.deltaY*.3))
},{passive:true})

/* Pinch-to-zoom en móvil */
let lastPinchDist=0
let touchStartX=0, touchStartY=0
renderer.domElement.addEventListener('touchstart',e=>{
  dragActive=true; lastPinchDist=0
  if(e.touches.length===1){
    lastMX=e.touches[0].clientX; lastMY=e.touches[0].clientY
    touchStartX=e.touches[0].clientX; touchStartY=e.touches[0].clientY
  }
  if(e.touches.length===2){
    const dx=e.touches[0].clientX-e.touches[1].clientX
    const dy=e.touches[0].clientY-e.touches[1].clientY
    lastPinchDist=Math.sqrt(dx*dx+dy*dy)
  }
},{passive:true})
window.addEventListener('touchend',e=>{
  dragActive=false; lastPinchDist=0
  if(e.changedTouches.length>0){
    const t=e.changedTouches[0]
    const movedX=Math.abs(t.clientX-touchStartX)
    const movedY=Math.abs(t.clientY-touchStartY)
    // Solo disparar si fue un tap quieto (no arrastre)
    if(movedX<10 && movedY<10){
      mouse2D.x=(t.clientX/W)*2-1; mouse2D.y=-(t.clientY/H)*2+1
      raycaster.setFromCamera(mouse2D,camera)
      const hits=raycaster.intersectObjects(memorySpheres.map(s=>s.hit))
      if(hits.length>0){
        const s=memorySpheres.find(s=>s.hit===hits[0].object)
        if(s&&s.unlocked){maybeStartAudio();openMsg(s)}
      }
    }
  }
})
window.addEventListener('touchmove',e=>{
  e.preventDefault()   // impide zoom nativo del navegador
  if(e.touches.length===2){
    const dx=e.touches[0].clientX-e.touches[1].clientX
    const dy=e.touches[0].clientY-e.touches[1].clientY
    const dist=Math.sqrt(dx*dx+dy*dy)
    if(lastPinchDist>0) camDist=Math.max(180,Math.min(550,camDist-(dist-lastPinchDist)*0.7))
    lastPinchDist=dist; return
  }
  if(!dragActive)return
  rotY+=(e.touches[0].clientX-lastMX)*.005;rotX+=(e.touches[0].clientY-lastMY)*.005
  rotX=Math.max(-.9,Math.min(.9,rotX));lastMX=e.touches[0].clientX;lastMY=e.touches[0].clientY
},{ passive:false })

window.addEventListener('click',()=>{
  if(hovered&&hovered.unlocked){ maybeStartAudio(); openMsg(hovered) }
})
window.addEventListener('resize',()=>{renderer.setSize(innerWidth,innerHeight);camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix()})

/* ═══════════════════════════════════════════════════
   WEB AUDIO — MÚSICA ROMÁNTICA GENERATIVA
   Arranca al primer click en una estrella desbloqueada
═══════════════════════════════════════════════════ */
const AudioCtx=window.AudioContext||window.webkitAudioContext
let actx=null, masterGain=null, audioStarted=false, isPlaying=false
const audioBtnEl  =document.getElementById('audio-btn')
const audioLabelEl=document.getElementById('audio-label')

/* Escala Mayor de Re — cálida, luminosa, romántica */
const SCALE=[146.83,185.00,220.00,246.94,293.66,329.63,369.99,440.00,493.88,587.33,659.25,739.99,880.00,987.77]
const CHORDS=[[146.83,185.00,220.00,293.66],[110.00,138.59,164.81,220.00],[123.47,146.83,185.00,246.94],[98.00,123.47,146.83,196.00]]

function initAudio(){
  if(actx)return
  actx=new AudioCtx()
  masterGain=actx.createGain(); masterGain.gain.setValueAtTime(0,actx.currentTime)
  const conv=buildReverb(actx,3.2), revSend=actx.createGain(); revSend.gain.value=.42
  const comp=actx.createDynamicsCompressor()
  comp.threshold.value=-18; comp.knee.value=12; comp.ratio.value=3; comp.attack.value=.08; comp.release.value=.4
  masterGain.connect(comp); comp.connect(revSend); revSend.connect(conv); conv.connect(actx.destination); comp.connect(actx.destination)
  buildPad(actx,masterGain); buildArpeggio(actx,masterGain); buildMelody(actx,masterGain); buildBass(actx,masterGain)
}

function buildPad(ctx,out){
  let ci=0
  function play(){
    const notes=CHORDS[ci++%CHORDS.length]
    notes.forEach((freq,ni)=>{
      [{type:'sine',vol:.020,det:0},{type:'triangle',vol:.010,det:3},{type:'sine',vol:.008,det:-3}].forEach(({type,vol,det})=>{
        const osc=ctx.createOscillator(),g=ctx.createGain(),f=ctx.createBiquadFilter()
        osc.type=type; osc.frequency.value=freq; osc.detune.value=det+(Math.random()-.5)*2
        f.type='lowpass'; f.frequency.value=1400+Math.random()*600; f.Q.value=.5
        const now=ctx.currentTime,dur=12+Math.random()*3,st=ni*.18
        g.gain.setValueAtTime(0,now+st); g.gain.linearRampToValueAtTime(vol,now+st+2.5)
        g.gain.setValueAtTime(vol,now+dur-2.8); g.gain.linearRampToValueAtTime(0,now+dur)
        osc.connect(f);f.connect(g);g.connect(out); osc.start(now+st);osc.stop(now+dur+.1)
      })
    })
    setTimeout(play,(11+Math.random()*3)*1000)
  }
  play()
}

function buildArpeggio(ctx,out){
  let ci=0,going=true,noteI=0
  const arpNotes=[[0,2,4,7],[0,2,4,5],[0,2,3,5],[0,2,4,7]]
  function playNote(){
    const chord=arpNotes[ci%arpNotes.length],baseIdx=[0,5,9,14][ci%4]
    const freq=SCALE[Math.min(baseIdx+chord[noteI%chord.length],SCALE.length-1)]
    const osc=ctx.createOscillator(),g=ctx.createGain(),f=ctx.createBiquadFilter()
    osc.type='sine'; osc.frequency.value=freq*(Math.random()>.85?2:1)
    f.type='highpass'; f.frequency.value=200
    const now=ctx.currentTime,dur=.9+Math.random()*.4,vol=.028+Math.random()*.012
    g.gain.setValueAtTime(0,now); g.gain.linearRampToValueAtTime(vol,now+.04); g.gain.exponentialRampToValueAtTime(.0001,now+dur)
    osc.connect(f);f.connect(g);g.connect(out); osc.start(now);osc.stop(now+dur+.1)
    if(going){noteI++;if(noteI>=chord.length){going=false;noteI=chord.length-2}}
    else{noteI--;if(noteI<0){going=true;noteI=1;ci++}}
    setTimeout(playNote,(60/72)*1000*(.5+Math.random()*.18))
  }
  setTimeout(playNote,1800)
}

function buildMelody(ctx,out){
  const phrases=[[9,7,9,12,11,9],[4,5,7,9,7,4],[12,11,9,7,9],[7,9,11,12,14,12,11],[4,7,9,7,4,2]]
  function playPhrase(){
    const phrase=phrases[~~(Math.random()*phrases.length)]
    let t=ctx.currentTime+.2
    phrase.forEach((idx,i)=>{
      const freq=SCALE[Math.min(idx,SCALE.length-1)]
      const osc=ctx.createOscillator(),g=ctx.createGain()
      const vib=ctx.createOscillator(),vibG=ctx.createGain()
      vib.frequency.value=5.5; vibG.gain.value=3.5; vib.connect(vibG); vibG.connect(osc.frequency)
      osc.type='sine'; osc.frequency.value=freq
      const dur=.55+Math.random()*.35,vol=.030+Math.random()*.015,gap=i===0?0:dur*.82
      t+=gap
      g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(vol,t+.08)
      g.gain.setValueAtTime(vol,t+dur*.65); g.gain.exponentialRampToValueAtTime(.0001,t+dur+.1)
      osc.connect(g);g.connect(out); osc.start(t);osc.stop(t+dur+.2); vib.start(t);vib.stop(t+dur+.2)
    })
    setTimeout(playPhrase,(6+Math.random()*9)*1000)
  }
  setTimeout(playPhrase,4000)
}

function buildBass(ctx,out){
  const roots=[73.42,55.00,61.74,49.00]; let bi=0
  function play(){
    const freq=roots[bi++%roots.length]
    const osc=ctx.createOscillator(),g=ctx.createGain(),f=ctx.createBiquadFilter()
    osc.type='sine'; osc.frequency.value=freq; f.type='lowpass'; f.frequency.value=220; f.Q.value=.4
    const now=ctx.currentTime,dur=11+Math.random()*4
    g.gain.setValueAtTime(0,now); g.gain.linearRampToValueAtTime(.06,now+1.8)
    g.gain.setValueAtTime(.06,now+dur-2); g.gain.linearRampToValueAtTime(0,now+dur)
    osc.connect(f);f.connect(g);g.connect(out); osc.start(now);osc.stop(now+dur)
    setTimeout(play,(10+Math.random()*3)*1000)
  }
  setTimeout(play,300)
}

function buildReverb(ctx,sec){
  const conv=ctx.createConvolver(),rate=ctx.sampleRate,len=rate*sec,buf=ctx.createBuffer(2,len,rate)
  for(let ch=0;ch<2;ch++){const d=buf.getChannelData(ch);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2.)}
  conv.buffer=buf; return conv
}

function startAudio(){
  if(!actx)initAudio()
  if(actx.state==='suspended')actx.resume()
  masterGain.gain.cancelScheduledValues(actx.currentTime)
  masterGain.gain.linearRampToValueAtTime(1,actx.currentTime+2.5)
  isPlaying=true; audioBtnEl.classList.remove('paused'); audioLabelEl.textContent='sonando'
}

function toggleAudio(){
  if(!audioStarted)return
  if(isPlaying){
    masterGain.gain.cancelScheduledValues(actx.currentTime)
    masterGain.gain.linearRampToValueAtTime(0,actx.currentTime+1.5)
    isPlaying=false; audioBtnEl.classList.add('paused'); audioLabelEl.textContent='silencio'
  } else { startAudio() }
}

audioBtnEl.addEventListener('click',e=>{e.stopPropagation();toggleAudio()})

function maybeStartAudio(){
  if(audioStarted)return
  audioStarted=true; audioBtnEl.classList.add('show'); startAudio()
}

/* ═══════════════════════════════════════════════════
   LOOP
═══════════════════════════════════════════════════ */
const clock=new THREE.Clock()

function loop(){
  requestAnimationFrame(loop)
  const t=clock.getElapsedTime()

  /* cámara */
  if(!dragActive) rotY+=.0008
  camera.position.x=Math.sin(rotY)*Math.cos(rotX)*camDist
  camera.position.y=Math.sin(rotX)*camDist
  camera.position.z=Math.cos(rotY)*Math.cos(rotX)*camDist
  camera.lookAt(0,0,0)
  const camD=camera.position.length()

  /* planeta */
  planetMat.uniforms.uTime.value=t
  cloudMat.uniforms.uTime.value=t
  planet.rotation.y=t*.04
  moonMat.uniforms.uTime.value=t
  moon.position.set(Math.cos(t*.22)*85,Math.sin(t*.14)*18,Math.sin(t*.22)*85)
  moon.rotation.y=t*.12

  /* bg stars */
  if(scene.userData.bgStarMat) scene.userData.bgStarMat.uniforms.uT.value=t

  /* estrellas de memoria — raycasting */
  raycaster.setFromCamera(mouse2D,camera)
  const hits=raycaster.intersectObjects(memorySpheres.map(s=>s.hit))
  hovered=null; let anyHover=false

  memorySpheres.forEach((s,i)=>{
    const isHit=hits.length>0&&hits[0].object===s.hit
    if(isHit&&s.unlocked){hovered=s;anyHover=true}
    s.hoverT+=((isHit&&s.unlocked)?1:-1)*.07
    s.hoverT=Math.max(0,Math.min(1,s.hoverT))
    s.burstT=Math.max(0,s.burstT-.025)
    const fy=Math.sin(t*.38+i*2.2)*.6
    s.core.position.y=s.pos.y+fy
    s.core.material.uniforms.uT.value=t
    s.core.material.uniforms.uHover.value=s.hoverT
    s.core.material.uniforms.uBurst.value=s.burstT
    if(s.halo){s.halo.position.y=s.pos.y+fy;s.halo.material.uniforms.uT.value=t;s.halo.material.uniforms.uHover.value=s.hoverT}
    if(s.orbit){s.orbit.material.uniforms.uT.value=t;s.orbit.material.uniforms.uHover.value=s.hoverT;s.orbit.material.uniforms.uCenter.value.y=s.pos.y+fy}
    if(s.ring){
      s.ring.position.y=s.pos.y+fy
      s.ring.rotation.y=t*.22+i*.8    // gira lentamente
      s.ring.material.uniforms.uT.value=t
    }
    s.hit.position.y=s.pos.y+fy
  })

  cursorEl.classList.toggle('hover',anyHover)

  /* ── Render Three.js ── */
  renderer.render(scene,camera)

  /* ── Canvas 2D: líneas DOF ── */
  ctx2d.clearRect(0,0,cvs2d.width,cvs2d.height)

  /* DOF focal distance = distancia cámara al planeta */
  DOF.focalDist=camD

  for(let i=0;i<LINE_COUNT;i++){
    const L=lineData[i]
    const ft=t*L.floatSpeed+L.phase
    const cx=L.x+Math.sin(ft*.7)*L.floatAmp
    const cy=L.y+Math.cos(ft*.9)*L.floatAmp*.6
    const cz=L.z+Math.sin(ft*1.1+1.3)*L.floatAmp*.5
    const dC=Math.sqrt(cx*cx+cy*cy+cz*cz)
    const blur=getBlur(dC,camD)
    const half=L.len*.5
    const pA=project(cx-L.dx*half,cy-L.dy*half,cz-L.dz*half)
    const pB=project(cx+L.dx*half,cy+L.dy*half,cz+L.dz*half)
    if(pA.behind||pB.behind)continue
    const flicker=.6+.4*Math.sin(t*L.floatSpeed*3+L.phase)
    const alpha=L.alpha*flicker
    const ri=~~(L.r*255),gi=~~(L.g*255),bi=~~(L.b*255)
    if(blur<2){
      const grad=ctx2d.createLinearGradient(pA.sx,pA.sy,pB.sx,pB.sy)
      grad.addColorStop(0,`rgba(${ri},${gi},${bi},0)`)
      grad.addColorStop(.5,`rgba(${ri},${gi},${bi},${alpha})`)
      grad.addColorStop(1,`rgba(${ri},${gi},${bi},0)`)
      ctx2d.strokeStyle=grad; ctx2d.lineWidth=(1.2+(1-blur*.3)*.8)*PR
      ctx2d.beginPath(); ctx2d.moveTo(pA.sx,pA.sy); ctx2d.lineTo(pB.sx,pB.sy); ctx2d.stroke()
      const mx=(pA.sx+pB.sx)*.5,my=(pA.sy+pB.sy)*.5
      const hg=ctx2d.createRadialGradient(mx,my,0,mx,my,4*PR)
      hg.addColorStop(0,`rgba(${ri},${gi},${bi},${alpha*.5})`);hg.addColorStop(1,`rgba(${ri},${gi},${bi},0)`)
      ctx2d.fillStyle=hg;ctx2d.beginPath();ctx2d.arc(mx,my,4*PR,0,Math.PI*2);ctx2d.fill()
    } else {
      const mx=(pA.sx+pB.sx)*.5,my=(pA.sy+pB.sy)*.5
      const bR=Math.max(blur,3)*PR*.5
      const a2=Math.min(alpha*.7,.65/(bR*.08+1))
      const bg=ctx2d.createRadialGradient(mx,my,0,mx,my,bR*1.8)
      bg.addColorStop(0,`rgba(${ri},${gi},${bi},${a2})`);bg.addColorStop(.45,`rgba(${ri},${gi},${bi},${a2*.4})`);bg.addColorStop(1,`rgba(${ri},${gi},${bi},0)`)
      ctx2d.fillStyle=bg;ctx2d.beginPath();ctx2d.arc(mx,my,bR*1.8,0,Math.PI*2);ctx2d.fill()
    }
  }

  /* halo del sol */
  const sunX=W*PR*.88,sunY=H*PR*.08
  const sg=ctx2d.createRadialGradient(sunX,sunY,0,sunX,sunY,H*PR*.55)
  sg.addColorStop(0,'rgba(255,240,200,.07)');sg.addColorStop(.5,'rgba(200,180,255,.03)');sg.addColorStop(1,'rgba(0,0,0,0)')
  ctx2d.fillStyle=sg; ctx2d.fillRect(0,0,cvs2d.width,cvs2d.height)
}

loop()
</script>
</body>
</html>
